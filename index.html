<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zenus · Transaction Globe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060d2e;color:#e2e8f0;font-family:'Inter',sans-serif;overflow:hidden}
.shell{display:flex;flex-direction:column;height:100svh}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:54px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(6,13,46,0.9);backdrop-filter:blur(12px);
}
.logo-title{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.hstats{display:flex;gap:20px}
.stat{text-align:right}
.stv{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:#fff}
.stl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:2px}

/* ── Main ── */
.main{flex:1;display:flex;min-height:0;position:relative}
#gw{flex:1;position:relative;overflow:hidden;background:transparent;cursor:pointer}
#gw canvas{position:absolute;top:0;left:0;width:100% !important;height:100% !important}
#gw-status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.3);z-index:5}

/* ── Sidebar (desktop) ── */
.sb{width:280px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.06)}
.feed{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start;padding:12px 14px;gap:4px}

/* ── Terminal-style notification rows ── */
.fi{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  line-height:1.4;
  color:rgba(255,255,255,0.85);
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  animation:term-in .2s ease;
  transition:opacity .4s ease;
  flex-shrink:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fi.dying{opacity:0}
@keyframes term-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
/* Terminal prefix */
.fi-pre{color:rgba(0,194,178,0.7);margin-right:6px}
.fi-amt{color:#00c2b2;font-weight:500}
.fi-route{color:rgba(255,255,255,0.4);font-size:10px;margin-left:8px}
.fi-time{color:rgba(255,255,255,0.2);font-size:9px;float:right}

/* ── Mobile ── */
@media(max-width:640px){
  header{padding:0 14px;height:50px}
  .logo-title{font-size:9px;letter-spacing:.1em}
  .hstats{gap:12px}
  .stv{font-size:12px}
  .stl{font-size:7px}

  .main{flex-direction:column}
  #gw{flex:1;width:100%}

  /* Terminal feed floats over globe from the top-left */
  .sb{
    position:absolute;
    top:10px;left:12px;right:12px;
    width:auto;
    border:none;background:transparent;
    pointer-events:none;
    z-index:50;
  }
  .feed{
    flex-direction:column;
    overflow:visible;
    padding:0;gap:3px;
    flex:none;height:auto;
  }
  .fi{
    pointer-events:none;
    background:rgba(4,8,24,0.65);
    backdrop-filter:blur(8px);
    border-radius:4px;
    padding:4px 8px;
    border-bottom:none;
    border-left:2px solid rgba(0,194,178,0.5);
  }
}
</style>
</head>
<body>
<div class="shell">
  <header>
    <span class="logo-title">Zenus Bank Live</span>
    <div class="hstats">
      <div class="stat"><div class="stv" id="sc">0</div><div class="stl">Transactions</div></div>
      <div class="stat"><div class="stv" id="sv">$0</div><div class="stl">Volume</div></div>
    </div>
  </header>
  <div class="main">
    <div id="gw">
      <div id="gw-status">Loading…</div>
    </div>
    <div class="sb">
      <div class="feed" id="feed"></div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const ACCENT = '#00c2b2';
const PC = { swift:ACCENT, fedwire:ACCENT, stablecoin:ACCENT, ach:ACCENT };
const TYPES = ['swift','fedwire','stablecoin','ach'];
const FADE_IN=600, HOLD=800, FADE_OUT=800, RING_DUR=3000;

const CITIES = {
  US:[37,-95,'United States'],   GB:[51.5,-.1,'London'],
  DE:[50.1,8.7,'Frankfurt'],     FR:[48.9,2.3,'Paris'],
  JP:[35.7,139.7,'Tokyo'],       CN:[31.2,121.5,'Shanghai'],
  AU:[-33.9,151.2,'Sydney'],     BR:[-23.5,-46.6,'São Paulo'],
  IN:[19.1,72.9,'Mumbai'],       CA:[43.7,-79.4,'Toronto'],
  MX:[19.4,-99.1,'Mexico City'], SG:[1.35,103.8,'Singapore'],
  AE:[25.2,55.3,'Dubai'],        ZA:[-26.2,28,'Johannesburg'],
  AR:[-34.6,-58.4,'Buenos Aires'],NG:[6.5,3.4,'Lagos'],
  KR:[37.6,127,'Seoul'],         RU:[55.8,37.6,'Moscow'],
  ES:[40.4,-3.7,'Madrid'],       IT:[45.5,9.2,'Milan'],
  NL:[52.4,4.9,'Amsterdam'],     SE:[59.3,18.1,'Stockholm'],
  CH:[47.4,8.5,'Zurich'],        HK:[22.3,114.2,'Hong Kong'],
  ID:[-6.2,106.8,'Jakarta'],     TR:[41,29,'Istanbul'],
  SA:[24.7,46.7,'Riyadh'],       PL:[52.2,21,'Warsaw'],
  TH:[13.8,100.5,'Bangkok'],     PH:[14.6,121,'Manila'],
  PR:[18.5,-66.1,'San Juan'],    NZ:[-36.9,174.8,'Auckland'],
  CL:[-33.5,-70.7,'Santiago'],   EG:[30,31.2,'Cairo'],
  KE:[-1.3,36.8,'Nairobi'],      MA:[34,-6.8,'Casablanca'],
  GH:[5.5,-.2,'Accra'],          PK:[24.9,67,'Karachi'],
  BD:[23.7,90.4,'Dhaka'],        VN:[10.8,106.6,'Ho Chi Minh'],
  MY:[3.1,101.7,'Kuala Lumpur'],
};
const CODES = Object.keys(CITIES);

// ── State ──────────────────────────────────────────────────────────────────────
let world, cv, ctx, ctxDots, CW, CH;
let dotVecs = [];
let arcs = [], txAnims = [];
let totalTx = 0, totalVol = 0, demoIdx = 0;

// ── Helpers ───────────────────────────────────────────────────────────────────
const ease = t => t<.5 ? 2*t*t : -1+(4-2*t)*t;
const H2R = h => ({ r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) });
const toRgba = (h,a) => { const{r,g,b}=H2R(h); return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a)).toFixed(3)})`; };
const fmtA = n => parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtV = v => v>=1e9?'$'+(v/1e9).toFixed(1)+'B':v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':'$'+v.toFixed(0);

// ── Project lat/lng → canvas px ───────────────────────────────────────────────
function proj(lat, lng) {
  if (!world || !CW) return null;
  const cam = world.camera();
  if (!cam) return null;
  const phi=(90-lat)*Math.PI/180, theta=(lng+180)*Math.PI/180, R=100;
  const wx=R*Math.sin(phi)*Math.cos(theta), wy=R*Math.cos(phi), wz=-R*Math.sin(phi)*Math.sin(theta);
  const cp=cam.position, front=(wx*cp.x+wy*cp.y+wz*cp.z)>0;
  const v=cam.matrixWorldInverse.elements;
  const cx=v[0]*wx+v[4]*wy+v[8]*wz+v[12], cy=v[1]*wx+v[5]*wy+v[9]*wz+v[13], cz=v[2]*wx+v[6]*wy+v[10]*wz+v[14];
  const p=cam.projectionMatrix.elements;
  const rx=p[0]*cx+p[4]*cy+p[8]*cz+p[12], ry=p[1]*cx+p[5]*cy+p[9]*cz+p[13], rw=p[3]*cx+p[7]*cy+p[11]*cz+p[15];
  if(rw<=0) return null;
  return { x:(rx/rw*.5+.5)*CW, y:(-ry/rw*.5+.5)*CH, front };
}

// Project lat/lng with altitude offset above sphere surface
function projAlt(lat, lng, alt) {
  if (!world || !CW) return null;
  const cam = world.camera(); if (!cam) return null;
  const phi=(90-lat)*Math.PI/180, theta=(lng+180)*Math.PI/180;
  const R=100*(1+alt);
  const wx=R*Math.sin(phi)*Math.cos(theta), wy=R*Math.cos(phi), wz=-R*Math.sin(phi)*Math.sin(theta);
  const v=cam.matrixWorldInverse.elements;
  const cx=v[0]*wx+v[4]*wy+v[8]*wz+v[12], cy=v[1]*wx+v[5]*wy+v[9]*wz+v[13], cz=v[2]*wx+v[6]*wy+v[10]*wz+v[14];
  const p=cam.projectionMatrix.elements;
  const rx=p[0]*cx+p[4]*cy+p[8]*cz+p[12], ry=p[1]*cx+p[5]*cy+p[9]*cz+p[13], rw=p[3]*cx+p[7]*cy+p[11]*cz+p[15];
  if(rw<=0) return null;
  return { x:(rx/rw*.5+.5)*CW, y:(-ry/rw*.5+.5)*CH };
}

// Draw a city name tag on canvas
function drawLabel(name, x, y, color, alpha) {
  ctx.save();
  ctx.font = '500 9px "IBM Plex Mono", monospace';
  const tw = ctx.measureText(name).width;
  const pad=5, h=16;
  const lx = x - tw/2 - pad, ly = y - h;
  // Background pill — near black for dark mode
  ctx.fillStyle = `rgba(8,12,30,${(alpha*0.92).toFixed(2)})`;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(lx, ly, tw+pad*2, h, 3);
  ctx.fill(); ctx.stroke();
  // Text
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name.toUpperCase(), x, ly + h/2);
  ctx.restore();
}
// Hardcoded land mask — no network needed, works from file://
// Uses simplified continent polygons at 200×100 grid
function buildDots() {
  // Simple per-cell land test using known land regions
  // This is a rough but reliable fallback that always works
  const COLS=160, ROWS=80;
  dotVecs = [];

  // We'll do a quick async attempt with the topology image,
  // but simultaneously prepare the hardcoded fallback
  const fallback = () => {
    // These are approximate land cells derived from a simplified world map
    // lat ranges for each longitude band
    const isLandApprox = (lon, lat) => {
      // North America
      if (lon>=-140&&lon<=-60) {
        if (lat>=25&&lat<=75) return true;
      }
      // South America
      if (lon>=-82&&lon<=-34) {
        if (lat>=-56&&lat<=12) return true;
      }
      // Europe
      if (lon>=-10&&lon<=40) {
        if (lat>=35&&lat<=72) return true;
      }
      // Africa
      if (lon>=-18&&lon<=52) {
        if (lat>=-35&&lat<=38) return true;
      }
      // Russia/North Asia
      if (lon>=30&&lon<=180) {
        if (lat>=50&&lat<=75) return true;
      }
      // Middle East
      if (lon>=26&&lon<=60) {
        if (lat>=12&&lat<=42) return true;
      }
      // South/SE Asia
      if (lon>=60&&lon<=110) {
        if (lat>=5&&lat<=35) return true;
      }
      // East Asia
      if (lon>=100&&lon<=145) {
        if (lat>=20&&lat<=55) return true;
      }
      // Southeast Asia islands
      if (lon>=95&&lon<=141) {
        if (lat>=-10&&lat<=20) return true;
      }
      // Australia
      if (lon>=113&&lon<=154) {
        if (lat>=-44&&lat<=-10) return true;
      }
      // New Zealand
      if (lon>=166&&lon<=178) {
        if (lat>=-47&&lat<=-34) return true;
      }
      // Greenland
      if (lon>=-55&&lon<=-17) {
        if (lat>=60&&lat<=84) return true;
      }
      // Japan
      if (lon>=130&&lon<=146) {
        if (lat>=30&&lat<=46) return true;
      }
      // UK/Ireland
      if (lon>=-8&&lon<=2) {
        if (lat>=50&&lat<=59) return true;
      }
      // Scandinavia
      if (lon>=4&&lon<=32) {
        if (lat>=55&&lat<=71) return true;
      }
      return false;
    };

    for (let r=0; r<ROWS; r++) {
      for (let c=0; c<COLS; c++) {
        const lon=(c/COLS)*360-180, lat=90-(r/ROWS)*180;
        if (lat < -50) continue;  // truncate south pole / Antarctica
        if (!isLandApprox(lon, lat)) continue;
        const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
        dotVecs.push({ x:Math.sin(phi)*Math.cos(theta), y:Math.cos(phi), z:-Math.sin(phi)*Math.sin(theta) });
      }
    }
    console.log('Dots (fallback):', dotVecs.length);
  };

  return new Promise(resolve => {
    // Try multiple sources for the water/land mask
    const sources = [
      // earth-water.png: ocean=pure blue (r≈0,g≈0,b≈255), land=dark (r≈0,g≈0,b≈0)
      // So LOW blue channel = land
      { url:'https://unpkg.com/three-globe@2.33.0/example/img/earth-water.png',
        test:(px,i)=> px[i+2] < 128 },
      // topology: brightness = elevation, ocean=0 (dark), land>0 (bright)
      { url:'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png',
        test:(px,i)=> px[i] > 12 },
    ];

    const trySource = (idx) => {
      if (idx >= sources.length) { fallback(); resolve(); return; }
      const { url, test } = sources[idx];
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const SW=720, SH=360;
          const SC=document.createElement('canvas'); SC.width=SW; SC.height=SH;
          const sx=SC.getContext('2d'); sx.drawImage(img,0,0,SW,SH);
          const px=sx.getImageData(0,0,SW,SH).data;
          const COLS2=160, ROWS2=80;
          dotVecs=[];
          for (let r=0; r<ROWS2; r++) {
            for (let c=0; c<COLS2; c++) {
              const lon=(c/COLS2)*360-180, lat=90-(r/ROWS2)*180;
              if (lat < -50) continue;  // truncate south pole / Antarctica
              const ix=Math.min(SW-1,Math.floor(((lon+180)/360)*SW));
              const iy=Math.min(SH-1,Math.floor(((90-lat)/180)*SH));
              if (!test(px, (iy*SW+ix)*4)) continue;
              const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
              dotVecs.push({ x:Math.sin(phi)*Math.cos(theta), y:Math.cos(phi), z:-Math.sin(phi)*Math.sin(theta) });
            }
          }
          if (dotVecs.length < 500) { dotVecs=[]; trySource(idx+1); }
          else { console.log(`Dots from source ${idx}:`, dotVecs.length); resolve(); }
        } catch(e) { trySource(idx+1); }
      };
      img.onerror = () => trySource(idx+1);
      img.src = url;
    };
    trySource(0);
  });
}

// ── Load globe.gl ─────────────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((res,rej) => {
    const s=document.createElement('script'); s.src=src;
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}

// ── Init — wait for DOM layout before measuring ───────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Use requestAnimationFrame to ensure browser has done first layout pass
  requestAnimationFrame(() => requestAnimationFrame(async () => {
    const st = document.getElementById('gw-status');
    st.textContent = 'Loading land data…';
    await buildDots();

    st.textContent = 'Loading globe…';
    let ok = false;
    for (const url of [
      'https://cdn.jsdelivr.net/npm/globe.gl@2.41.5/dist/globe.gl.min.js',
      'https://unpkg.com/globe.gl@2.41.5/dist/globe.gl.min.js',
    ]) {
      try { await loadScript(url); if (typeof Globe !== 'undefined') { ok=true; break; } } catch(e) {}
    }
    if (!ok) { st.textContent='Failed to load globe.'; return; }
    st.style.display = 'none';
    boot();
  }));
});

// ── Boot ──────────────────────────────────────────────────────────────────────
function boot() {
  const gw = document.getElementById('gw');
  CW = gw.clientWidth;
  CH = gw.clientHeight;

  // Init globe.gl first
  world = new Globe(gw)
    .width(CW).height(CH)
    .backgroundColor('rgba(0,0,0,0)')
    .globeImageUrl('')
    .showAtmosphere(false)
    .arcsData([]).arcStartLat(d=>d.fLat).arcStartLng(d=>d.fLng)
    .arcEndLat(d=>d.tLat).arcEndLng(d=>d.tLng)
    .arcColor(d=>d.colors).arcAltitudeAutoScale(0.3).arcStroke(0.8)
    .arcDashLength(1).arcDashGap(0).arcDashAnimateTime(0).arcsTransitionDuration(0)
    .htmlElementsData([])
    .htmlLat(d=>d.lat).htmlLng(d=>d.lng)
    .htmlAltitude(0.02).htmlElement(d=>d.el)
    .enablePointerInteraction(true);

  try { const m=world.globeMaterial(); if(m){m.opacity=0;m.transparent=true;m.needsUpdate=true;} } catch(e){}

  // Single canvas on top of everything — draws ocean, dots, AND circles
  cv = document.createElement('canvas');
  const DPR = window.devicePixelRatio || 1;
  cv.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:999;width:100%;height:100%;';
  cv.width = CW * DPR; cv.height = CH * DPR;
  ctx = cv.getContext('2d');
  ctx.scale(DPR, DPR);
  ctxDots = ctx;
  gw.appendChild(cv);

  function onResize() {
    CW = gw.clientWidth;
    CH = gw.clientHeight;
    if (!CW || !CH) return;
    const dpr = window.devicePixelRatio || 1;
    cv.width  = CW * dpr;
    cv.height = CH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    world && world.width(CW).height(CH);
  }

  // ResizeObserver catches all size changes (window, flex reflow, mobile keyboard)
  if (window.ResizeObserver) {
    new ResizeObserver(onResize).observe(gw);
  } else {
    window.addEventListener('resize', onResize);
  }

  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.4;

  function setView() {
    const mob = window.innerWidth <= 640;
    // altitude: on mobile zoom out enough to fit width; use CW to calculate
    const alt = mob ? Math.max(2.2, (CH / CW) * 1.4) : 2.0;
    world.pointOfView({ lat: 25, lng: -10, altitude: alt });
  }
  setView();
  window.addEventListener('resize', setView);

  loop();
  [0,900,1900,3100,4500].forEach(d => setTimeout(fireDemo, d));
}

// ── Render loop ───────────────────────────────────────────────────────────────
function loop() {
  const now = Date.now();
  let dirtyArcs = false;

  // Animate txAnims
  txAnims.forEach(tx => {
    if (tx.done || tx.isPulse) return;  // pulses manage their own lifecycle in draw
    const e = now - tx.t0;
    let al;
    if (e < FADE_IN) al = ease(e/FADE_IN);
    else if (e < FADE_IN+HOLD) al = 1;
    else { const f=(e-FADE_IN-HOLD)/FADE_OUT; if(f>=1){al=0;tx.done=true;}else al=ease(1-f); }
    tx.al = al;
    if (tx.arc) { tx.arc.colors=[toRgba(tx.col,al),toRgba(tx.col,al*.4)]; dirtyArcs=true; }
    if (tx.lblEls) tx.lblEls.forEach(el => el.style.opacity=al.toFixed(3));
  });

  if (dirtyArcs) world && world.arcsData([...arcs]);

  // Cleanup done animations
  txAnims = txAnims.filter(t=>!t.done);
  updateStats();

  // ── Draw ──
  if (!ctx || !CW || !CH) { requestAnimationFrame(loop); return; }
  ctx.clearRect(0,0,CW,CH);
  if (ctxDots) ctxDots.clearRect(0,0,CW,CH);

  const cam = world && world.camera();
  if (cam && ctxDots) {
    const R=100;
    const v=cam.matrixWorldInverse.elements, p=cam.projectionMatrix.elements;

    // (ocean fill removed — dots show through cleanly)

    // Land dots — all dots visible, front=large, back=small
    if (dotVecs.length > 0) {
      const cp=cam.position;
      const camDist = Math.sqrt(cp.x*cp.x + cp.y*cp.y + cp.z*cp.z);
      const baseDOT = 1.65 * (300 / camDist);

      ctxDots.fillStyle='rgba(74,144,226,1)';

      for (let i=0; i<dotVecs.length; i++) {
        const d=dotVecs[i];
        const wx=R*d.x, wy=R*d.y, wz=R*d.z;

        // Facing: +1 = fully toward camera, -1 = fully away
        const facing = (wx*cp.x+wy*cp.y+wz*cp.z) / (R*camDist);

        const cx=v[0]*wx+v[4]*wy+v[8]*wz+v[12];
        const cy=v[1]*wx+v[5]*wy+v[9]*wz+v[13];
        const cz=v[2]*wx+v[6]*wy+v[10]*wz+v[14];
        const rx=p[0]*cx+p[4]*cy+p[8]*cz+p[12];
        const ry=p[1]*cx+p[5]*cy+p[9]*cz+p[13];
        const rw=p[3]*cx+p[7]*cy+p[11]*cz+p[15];
        if (rw<=0) continue;

        const sx=(rx/rw*.5+.5)*CW, sy=(-ry/rw*.5+.5)*CH;

        // Size: front full, back shrinks to 50% — smooth gradient across hemisphere
        const t = (facing + 1) / 2; // remap -1..1 → 0..1
        const dotR = Math.max(0.3, baseDOT * (0.5 + t * 0.5));
        ctxDots.globalAlpha = 0.6 + t * 0.4; // 0.6 fully away → 1.0 fully front
        ctxDots.beginPath(); ctxDots.arc(sx,sy,dotR,0,6.2832); ctxDots.fill();
      }
      ctxDots.globalAlpha=1;
    }
  }

  // ── Transaction animations — drawn AFTER dots so they appear on top ──
  txAnims.forEach(tx => {
    if (tx.done) return;

    // ── Canvas pulse rings (expanding circles, fully canvas-projected) ──
    if (tx.isPulse) {
      const elapsed = Date.now() - tx.t0;
      const progress = elapsed / tx.dur;
      if (progress >= 1) { tx.done = true; return; }
      const pos = proj(tx.lat, tx.lng);
      if (!pos) return;
      const {r,g,b} = H2R(tx.col);
      // Draw 3 staggered rings expanding outward
      for (let ring = 0; ring < 3; ring++) {
        const offset = ring / 3;
        const p = (progress + offset) % 1;
        const radius = 4 + p * 32;
        const alpha = (1 - p) * 0.7;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, radius, 0, 6.2832);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
      return;
    }

    if (tx.al < 0.01) return;
    const {r,g,b}=H2R(tx.col);
    const al=tx.al;
    const PURPLE='#7c3aed';
    const TEAL=tx.col;
    const {r:pr,g:pg,b:pb}=H2R(PURPLE);
    const {r:tr,g:tg,b:tb}=H2R(TEAL);

    // ── Arc with purple→teal gradient ──
    if (!tx.same) {
      const pts=[];
      for (let t=0; t<=1; t+=0.025) {
        const lat = tx.fLat + (tx.tLat-tx.fLat)*t;
        const lng = tx.fLng + (tx.tLng-tx.fLng)*t;
        const alt = Math.sin(t*Math.PI) * 0.3;
        const pp = projAlt(lat, lng, alt);
        if (pp) pts.push({...pp, t});
      }
      if (pts.length > 2) {
        // Draw arc as small segments each with interpolated color
        for (let i=1; i<pts.length; i++) {
          const t0=pts[i-1].t, t1=pts[i].t;
          const tm=(t0+t1)/2;
          // Interpolate purple→teal along arc
          const ri=Math.round(pr+(tr-pr)*tm);
          const gi=Math.round(pg+(tg-pg)*tm);
          const bi=Math.round(pb+(tb-pb)*tm);
          ctx.beginPath();
          ctx.moveTo(pts[i-1].x, pts[i-1].y);
          ctx.lineTo(pts[i].x, pts[i].y);
          ctx.strokeStyle=`rgba(${ri},${gi},${bi},${al.toFixed(2)})`;
          ctx.lineWidth=1.8;
          ctx.stroke();
        }
      }
    }

    // ── Origin circle (hollow ring) — PURPLE ──
    const op=proj(tx.fLat,tx.fLng);
    if (op) {
      ctx.beginPath(); ctx.arc(op.x,op.y,6,0,6.2832);
      ctx.strokeStyle=`rgba(${pr},${pg},${pb},${al.toFixed(2)})`; ctx.lineWidth=1.8; ctx.stroke();
      const grd=ctx.createRadialGradient(op.x,op.y,2,op.x,op.y,18);
      grd.addColorStop(0,`rgba(${pr},${pg},${pb},${(al*.28).toFixed(2)})`);
      grd.addColorStop(1,`rgba(${pr},${pg},${pb},0)`);
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(op.x,op.y,18,0,6.2832); ctx.fill();
      if (tx.fromName) drawLabel(tx.fromName, op.x, op.y-14, `rgba(${pr},${pg},${pb},${al.toFixed(2)})`, al);
    }

    // ── Destination circle (solid dot) — TEAL ──
    const dp=proj(tx.tLat,tx.tLng);
    if (dp) {
      ctx.fillStyle=`rgba(${tr},${tg},${tb},${al.toFixed(2)})`;
      ctx.beginPath(); ctx.arc(dp.x,dp.y,5,0,6.2832); ctx.fill();
      const grd=ctx.createRadialGradient(dp.x,dp.y,0,dp.x,dp.y,18);
      grd.addColorStop(0,`rgba(${tr},${tg},${tb},${(al*.3).toFixed(2)})`);
      grd.addColorStop(1,`rgba(${tr},${tg},${tb},0)`);
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(dp.x,dp.y,18,0,6.2832); ctx.fill();
      if (tx.toName && !tx.same) drawLabel(tx.toName, dp.x, dp.y-14, `rgba(${tr},${tg},${tb},${al.toFixed(2)})`, al);
    }
  });

  requestAnimationFrame(loop);
}

// ── Process transaction ────────────────────────────────────────────────────────
function processTx(data) {
  const { from_country='US', to_country='GB', payment_type='swift', amount=1000, currency='USD' } = data;
  const type = (payment_type||'swift').toLowerCase();
  const col  = PC[type] || PC.swift;
  const fc   = CITIES[from_country]||CITIES.US;
  const tc   = CITIES[to_country]  ||CITIES.GB;
  totalTx++; totalVol += parseFloat(amount)||0;

  const same = from_country === to_country;

  // All drawing is on canvas — no globe.gl rings
  txAnims.push({
    t0: Date.now(), col, al:0, done:false, same,
    fLat:fc[0], fLng:fc[1], tLat:tc[0], tLng:tc[1],
    fromName: fc[2], toName: tc[2],
  });

  // Canvas pulse rings — separate entries that just expand and fade
  const pulseDur = RING_DUR;
  const addPulse = (lat,lng,c) => txAnims.push({
    isPulse:true, t0:Date.now(), dur:pulseDur, lat, lng, col:c, done:false,
  });
  addPulse(fc[0], fc[1], col);
  if (!same) addPulse(tc[0], tc[1], col);

  addFeed(fc[2], tc[2], same, type, col, amount, currency);
  updateStats();
}

function mkLabel(name, col, isOrigin) {
  const w=document.createElement('div');
  w.style.cssText='display:flex;align-items:center;gap:5px;opacity:0;white-space:nowrap;transform:translateY(-50%);pointer-events:none';
  const dot=document.createElement('div');
  dot.style.cssText=`width:6px;height:6px;border-radius:50%;flex-shrink:0;border:1.5px solid ${col};background:${isOrigin?'transparent':col}`;
  const lbl=document.createElement('div');
  lbl.style.cssText=`font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:${col};background:rgba(255,255,255,.94);border:1px solid ${col};padding:2px 7px;border-radius:2px;box-shadow:0 1px 8px rgba(0,0,0,.12)`;
  lbl.textContent=name; w.appendChild(dot); w.appendChild(lbl); return w;
}

function addFeed(from,to,same,type,col,amount,currency) {
  const feed=document.getElementById('feed');
  const el=document.createElement('div'); el.className='fi';
  const now=new Date().toLocaleTimeString('en-US',{hour12:false});
  const route = same ? `◎ ${from}` : `${from} → ${to}`;
  el.innerHTML=`<span class="fi-pre">▸</span><span class="fi-amt">${currency} ${fmtA(amount)}</span><span class="fi-route">${route}</span><span class="fi-time">${now}</span>`;
  feed.insertBefore(el, feed.firstChild);

  const isMob = window.innerWidth <= 640;
  const MAX = isMob ? 3 : 12;

  // On mobile: force-expire oldest when hitting 3
  if (isMob && feed.children.length >= MAX) {
    const oldest = feed.lastChild;
    if (oldest && oldest !== el) {
      oldest.classList.add('dying');
      setTimeout(()=>{ if(oldest.parentNode) oldest.remove(); }, 350);
    }
  }
  while(feed.children.length > MAX) {
    const old = feed.lastChild; old && old.remove();
  }

  // Auto-expire after 3s
  setTimeout(()=>{
    if(!el.parentNode) return;
    el.classList.add('dying');
    setTimeout(()=>{ if(el.parentNode) el.remove(); }, 400);
  }, 3000);
}

function updateStats() {
  document.getElementById('sc').textContent=totalTx.toLocaleString();
  document.getElementById('sv').textContent=fmtV(totalVol);
}

window.receiveWebhook=p=>{ try{processTx(typeof p==='string'?JSON.parse(p):p);}catch(e){} };
window.addEventListener('message',e=>{ if(e.data?.type==='transaction') processTx(e.data.payload); });

function fireDemo() {
  const from=CODES[Math.floor(Math.random()*CODES.length)];
  let to=CODES[Math.floor(Math.random()*CODES.length)];
  if(Math.random()<.1) to=from;
  processTx({from_country:from,to_country:to,payment_type:TYPES[demoIdx++%TYPES.length],amount:(Math.random()*48000+200).toFixed(2),currency:'USD'});
}
// Globe is the button — click anywhere on it to fire a transaction
document.getElementById('gw').addEventListener('click', fireDemo);
